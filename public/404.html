<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Super Duper Bordtennis</title>
    <script type="text/javascript">
      // Single Page Apps for GitHub Pages: encodes the requested path into a
      // query string and redirects to index.html, which decodes it back
      // before React Router mounts. See https://github.com/rafgraph/spa-github-pages
      var pathSegmentsToKeep = 1; // GitHub Pages project site: /<repo>/...

      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
        l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
